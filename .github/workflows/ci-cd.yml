name: Project CI/CD

on:
  push:
    branches:
      - master
  pull_request: 
    branches: 
      - master
  workflow_dispatch: 

permissions: 
    contents: read

jobs:
  compile:
    name: Compile project
    runs-on: ubuntu-latest

    steps:
      - name: Get project code
        uses: actions/checkout@v5

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Show java version
        run: java -version


      - name: Compile project
        run: |
          mkdir -p out
          find src -name "*.java" > sources.txt
          javac -encoding UTF-8 -d out @sources.txt

      - name: Create runnable JAR
        run: |
          mkdir -p delivery
          jar cfe delivery/university-system.jar kbtu.university.UniversitySystemDemo -C out .


      - name: Run simple check
        run: java -cp out kbtu.university.MainPartBCheck

      - name: Run full project demo
        run: java -cp out kbtu.university.UniversitySystemDemo

      - name: Run runnable JAR
        run: java -jar delivery/university-system.jar


      - name: Upload compiled classes artifact
        uses: actions/upload-artifact@v4
        with:
            name: compiled-classes
            path: out

      - name: Upload runnable JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: university-system-jar
          path: delivery/university-system.jar

  delivery:
    name: Prepare delivery package
    runs-on: ubuntu-latest
    needs: compile

    steps:
      - name: Get project code
        uses: actions/checkout@v5

      - name: Install java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
    
          
      - name: Download runnable JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: university-system-jar
          path: delivery

      - name: Create delivery zip
        run: |
          mkdir -p delivery
          zip -r delivery/oop-project-delivery.zip src Project.iml delivery/university-system.jar

      - name: Upload project zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: oop-project-delivery-zip
          path: delivery/oop-project-delivery.zip